[build]
  command = "npm run build"
  publish = "."
  functions = "functions"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-sitemap"

# Specific page rewrites (specific to general order)
[[redirects]]
  from = "/collection"
  to = "/shop.html"
  status = 301

# Handle WordPress/CMS probe paths - return 404 responses
[[redirects]]
  from = "/wp-admin"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wordpress/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/config.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/phpmyadmin/*"
  to = "/404.html"
  status = 404
  force = true

# API routing
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Canonical route hygiene
[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/shop"
  to = "/shop.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 301

# Security + performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://via.placeholder.com https://smattirestore.com https://i.ytimg.com https://*.tiktokcdn.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; media-src 'self' https://res.cloudinary.com https://player.vimeo.com; frame-src https://www.youtube-nocookie.com https://player.vimeo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content;"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https://via.placeholder.com https://smattirestore.com https://i.ytimg.com https://*.tiktokcdn.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; media-src 'self' https://res.cloudinary.com https://player.vimeo.com; frame-src https://www.youtube-nocookie.com https://player.vimeo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content;"
    # Prevent CDN/Safari content transformation that can corrupt lazy-loaded assets
    Cache-Control = "no-transform"

# HTML pages — Safari/Applebot-friendly: no-transform keeps content canonical
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-transform"
    Vary = "Accept-Encoding"

# Static assets cache policy
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Dynamic/API should not be browser-cached by default
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

# Product images — long cache + indexable by Googlebot-Image
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "index, imageindex"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "index, imageindex"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "index, imageindex"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "index, imageindex"
    Vary = "Accept-Encoding"

# Sitemap — daily refresh hint for crawlers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

# Video assets — long CDN cache; Googlebot-Video can index them
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "index"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "index"
    Vary = "Accept-Encoding"

# oEmbed API — short browser cache; edge cache handled by function response
[[headers]]
  for = "/api/oembed"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400"
