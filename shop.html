<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | THE REALONES STORE | Luxury Fashion</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#d4af37', 'gold-light': '#f4e4ba', charcoal: '#1a1a1a', dark: '#0a0a0a' },
                    fontFamily: { playfair: ['Playfair Display', 'serif'], rajdhani: ['Rajdhani', 'sans-serif'] },
                    boxShadow: { 'gold-glow': '0 0 40px -10px rgba(212, 175, 55, 0.15)', 'gold-glow-hover': '0 0 50px -5px rgba(212, 175, 55, 0.3)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #d4af37; }
        .glass-panel { background: rgba(26, 26, 26, 0.4); backdrop-filter: blur(12px); }
        .image-container { aspect-ratio: 3/4; background-color: #111; }
    </style>
</head>
<body class="bg-dark text-white font-rajdhani selection:bg-gold selection:text-dark antialiased">

    <nav class="fixed w-full z-50 glass-panel border-b border-gold/10 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="font-playfair text-2xl tracking-[0.15em] text-gold hover:text-gold-light transition-colors">SM ATTIRE</a>
            <div class="flex gap-8 text-[11px] font-semibold tracking-[0.2em] uppercase">
                <a href="shop.html" class="text-gold border-b border-gold pb-1">All Collections</a>
                <a href="shop.html#casual-streetwear" class="hover:text-gold transition-colors">Casual Streetwear</a>
                <a href="shop.html#neatfit-collection" class="hover:text-gold transition-colors">The Neatfit Collection</a>
            </div>
        </div>
    </nav>

    <header class="pt-48 pb-16 px-6 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-[radial-gradient(ellipse_at_center,rgba(212,175,55,0.15)_0%,rgba(10,10,10,0)_70%)] pointer-events-none"></div>
        <div class="max-w-7xl mx-auto text-center relative z-10">
            <h1 class="font-playfair text-6xl md:text-8xl mb-6 tracking-tighter text-white">SM ATTIRE</h1>
            <div class="flex items-center justify-center gap-4 text-gold uppercase tracking-[0.6em] text-[10px] font-semibold">
                <span class="w-8 h-[1px] bg-gold/50"></span>
                <p>All Collections</p>
                <span class="w-8 h-[1px] bg-gold/50"></span>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-wrap justify-center gap-4">
        <button onclick="loadProducts('all')" class="px-6 py-2 text-[10px] font-semibold tracking-[0.3em] uppercase text-white/70 border border-white/10 hover:border-gold hover:text-gold transition-all duration-300">All Collections</button>
        <button onclick="loadProducts('Casual Streetwear')" class="px-6 py-2 text-[10px] font-semibold tracking-[0.3em] uppercase text-white/70 border border-white/10 hover:border-gold hover:text-gold transition-all duration-300">Casual Streetwear</button>
        <button onclick="loadProducts('Neatfit Collection')" class="px-6 py-2 text-[10px] font-semibold tracking-[0.3em] uppercase text-white/70 border border-white/10 hover:border-gold hover:text-gold transition-all duration-300">The Neatfit Collection</button>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </main>

    <footer class="bg-black border-t border-gold/20 py-16 relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <h2 class="font-playfair text-2xl text-gold mb-4 tracking-widest">SM ATTIRE</h2>
            <p class="text-[9px] tracking-[0.4em] text-white/40 uppercase">&copy; 2026 Crafted for Royalty &bull; International Online Store</p>
        </div>
    </footer>

    <script src="app.js"></script>
    
    <script>
        const inventory = [
            { id: 1, name: "Masterpiece 01", price: 15000, category: "Neatfit Collection", image_url: "1.jpg" },
            { id: 2, name: "Masterpiece 02", price: 12500, category: "Neatfit Collection", image_url: "2.jpg" },
            { id: 3, name: "Masterpiece 03", price: 8000, category: "Casual Streetwear", image_url: "3.jpg" },
            { id: 4, name: "Masterpiece 04", price: 9500, category: "Neatfit Collection", image_url: "4.jpg" },
            { id: 5, name: "Masterpiece 05", price: 7000, category: "Casual Streetwear", image_url: "5.jpg" },
            { id: 6, name: "Masterpiece 06", price: 18000, category: "Neatfit Collection", image_url: "6.jpg" },
            { id: 7, name: "Masterpiece 07", price: 11000, category: "Casual Streetwear", image_url: "7.jpg" },
            { id: 8, name: "Masterpiece 08", price: 22000, category: "Neatfit Collection", image_url: "8.jpg" },
            { id: 9, name: "Masterpiece 09", price: 13500, category: "Casual Streetwear", image_url: "9.jpg" },
            { id: 10, name: "Masterpiece 10", price: 10500, category: "Neatfit Collection", image_url: "10.jpg" },
            { id: 11, name: "Masterpiece 11", price: 19000, category: "Neatfit Collection", image_url: "11.jpg" },
            { id: 12, name: "Masterpiece 12", price: 14000, category: "Casual Streetwear", image_url: "12.jpg" },
            { id: 13, name: "Masterpiece 13", price: 9000, category: "Casual Streetwear", image_url: "13.jpg" },
            { id: 14, name: "Masterpiece 14", price: 16500, category: "Neatfit Collection", image_url: "14.jpg" },
            { id: 15, name: "Masterpiece 15", price: 8500, category: "Casual Streetwear", image_url: "15.jpg" },
            { id: 16, name: "Masterpiece 16", price: 25000, category: "Neatfit Collection", image_url: "16.jpg" },
            { id: 17, name: "Masterpiece 17", price: 6500, category: "Casual Streetwear", image_url: "17.jpg" },
            { id: 18, name: "Masterpiece 18", price: 12000, category: "Casual Streetwear", image_url: "18.jpg" },
            { id: 19, name: "Masterpiece 19", price: 17500, category: "Neatfit Collection", image_url: "19.jpg" },
            { id: 20, name: "The Neatfit Exclusive", price: 30000, category: "Neatfit Collection", image_url: "20.jpg" }
        ];

        function loadProducts(filter = 'all') {
            const grid = document.getElementById('productGrid');
            
            const filtered = filter === 'all' 
                ? inventory 
                : inventory.filter(p => p.category === filter);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center"><p class="text-white/50 font-playfair text-2xl italic">The vault is currently empty.</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const productData = {
                    id: p.id,
                    name: p.name.replace(/'/g, "\\'"),
                    price: p.price,
                    image: p.image_url,
                    category: p.category
                };
                const jsonString = JSON.stringify(productData).replace(/"/g, '&quot;');

                return `
                <div class="group relative bg-charcoal border border-white/5 rounded-sm overflow-hidden shadow-gold-glow hover:shadow-gold-glow-hover hover:border-gold/40 transition-all duration-700 hover:-translate-y-2">
                    <div class="relative image-container overflow-hidden">
                        <img src="${p.image_url}" 
                             alt="${p.name}" 
                             loading="lazy"
                             decoding="async"
                             class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110"
                             onerror="this.src='https://via.placeholder.com/600x800/1a1a1a/d4af37?text=Image+Missing'">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark/90 via-transparent to-transparent opacity-80"></div>
                    </div>
                    <div class="absolute bottom-0 left-0 w-full p-8 transform translate-y-6 group-hover:translate-y-0 transition-transform duration-500">
                        <p class="text-[9px] font-bold tracking-[0.4em] text-gold uppercase mb-2">${p.category}</p>
                        <h3 class="font-playfair text-3xl mb-4 text-white">${p.name}</h3>
                        <div class="flex justify-between items-end opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">
                            <span class="font-rajdhani text-xl tracking-tight text-white/90">KES ${Number(p.price).toLocaleString()}</span>
                            <button onclick="if(typeof addToCart === 'function') addToCart(${jsonString});" 
                                    class="text-[10px] tracking-[0.2em] uppercase text-gold border-b border-gold pb-1 hover:text-white hover:border-white transition-all">
                                Acquire
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', () => loadProducts());
    </script>
</body>
</html>
